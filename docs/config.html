<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSF // Config</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #ccc;
    font-family: 'Courier New', Consolas, monospace;
    font-size: 13px;
    line-height: 1.6;
    padding: 30px 20px;
  }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 16px; color: #fff; font-weight: 400; margin-bottom: 4px; }
  .sub { color: #666; font-size: 11px; margin-bottom: 24px; }
  h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #666;
    margin: 20px 0 10px;
    padding-bottom: 4px;
    border-bottom: 1px solid #222;
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
  }
  .row label { color: #999; flex: 1; }
  .row .hint { color: #555; font-size: 11px; margin-left: 8px; }
  input[type="number"] {
    font-family: inherit;
    font-size: 13px;
    background: #111;
    color: #fff;
    border: 1px solid #333;
    padding: 4px 8px;
    width: 100px;
    text-align: right;
    border-radius: 3px;
  }
  input[type="number"]:focus {
    outline: none;
    border-color: #666;
  }
  .actions {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid #222;
    display: flex;
    gap: 10px;
  }
  button {
    font-family: inherit;
    font-size: 12px;
    padding: 6px 16px;
    background: #111;
    color: #ccc;
    border: 1px solid #333;
    cursor: pointer;
    border-radius: 3px;
  }
  button:hover { background: #222; color: #fff; border-color: #555; }
  .btn-save { background: #fff; color: #000; border-color: #fff; }
  .btn-save:hover { background: #ddd; }
  .status {
    margin-top: 12px;
    color: #666;
    font-size: 11px;
    min-height: 16px;
  }
  a { color: #666; text-decoration: none; }
  a:hover { color: #fff; }
</style>
</head>
<body>
<div class="container">
  <h1>Claude Skills Factory // Config</h1>
  <p class="sub">Changes are saved to localStorage and loaded on next game start.</p>

  <div id="fields"></div>

  <div class="actions">
    <button class="btn-save" onclick="save()">Save & Return to Game</button>
    <button onclick="reset()">Reset to Defaults</button>
  </div>
  <div class="status" id="status"></div>

  <br>
  <a href="./">&larr; back to game</a>
</div>

<script>
const DEFAULTS = {
  startTokens:           { v: 500,     label: "Starting tokens",              cat: "Starting Conditions" },
  startMaxTokens:        { v: 2000,    label: "Starting token capacity",      cat: "Starting Conditions" },
  startTokenPrice:       { v: 0.002,   label: "Starting token price ($)",     cat: "Starting Conditions", step: 0.001 },
  startFunds:            { v: 10.00,   label: "Starting funds ($)",           cat: "Starting Conditions", step: 0.5 },
  skillPrice:            { v: 0.05,    label: "Skill sell price ($)",         cat: "Starting Conditions", step: 0.01 },

  costScaling:           { v: 1.12,    label: "Cost scaling per purchase",    cat: "Economy", step: 0.01 },
  sellBatch:             { v: 50,      label: "Skills sold per batch",        cat: "Economy" },
  demandDecayPerSale:    { v: 0.001,   label: "Demand decay per sale",        cat: "Economy", step: 0.001 },
  demandRecoveryRate:    { v: 0.005,   label: "Demand recovery per tick",     cat: "Economy", step: 0.001 },
  demandRecoveryInterval:{ v: 30,      label: "Demand recovery interval (ticks)", cat: "Economy" },
  demandFloor:           { v: 0.05,    label: "Minimum demand",              cat: "Economy", step: 0.01 },
  autoSellThreshold:     { v: 30,      label: "Auto-sell above (unsold)",    cat: "Economy" },
  autoBuyPct:            { v: 0.3,     label: "Auto-buy tokens below (%)",   cat: "Economy", step: 0.05 },
  singularityGrowth:     { v: 0.002,   label: "Singularity growth rate",     cat: "Economy", step: 0.001 },

  autocoderCost:         { v: 5,       label: "AutoCoder base cost",          cat: "Generators" },
  autocoderRate:         { v: 1,       label: "AutoCoder rate (/sec)",        cat: "Generators", step: 0.1 },
  pipelineCost:          { v: 50,      label: "Pipeline base cost",           cat: "Generators" },
  pipelineRate:          { v: 8,       label: "Pipeline rate (/sec)",         cat: "Generators" },
  factoryCost:           { v: 500,     label: "Factory base cost",            cat: "Generators" },
  factoryRate:           { v: 50,      label: "Factory rate (/sec)",          cat: "Generators" },
  quantumCost:           { v: 5000,    label: "Quantum Forge base cost",      cat: "Generators" },
  quantumRate:           { v: 400,     label: "Quantum Forge rate (/sec)",    cat: "Generators" },

  unlockPipeline:        { v: 5,       label: "AutoCoders to unlock Pipeline",   cat: "Unlock Thresholds" },
  unlockFactory:         { v: 3,       label: "Pipelines to unlock Factory",     cat: "Unlock Thresholds" },
  unlockQuantum:         { v: 2,       label: "Factories to unlock Quantum",     cat: "Unlock Thresholds" },

  upgPrompt:             { v: 25,      label: "Prompt Engineering cost",      cat: "Upgrade Costs" },
  upgChain:              { v: 100,     label: "Chain of Thought cost",        cat: "Upgrade Costs" },
  upgAgentic:            { v: 500,     label: "Agentic Workflows cost",       cat: "Upgrade Costs" },
  upgAgi:                { v: 5000,    label: "Recursive Self-Improvement cost", cat: "Upgrade Costs" },
  upgSingularity:        { v: 100000,  label: "The Singularity cost",         cat: "Upgrade Costs" },

  revealPrompt:          { v: 25,      label: "Show Prompt at (skills)",      cat: "Upgrade Reveal" },
  revealChain:           { v: 75,      label: "Show Chain at (skills)",       cat: "Upgrade Reveal" },
  revealAgentic:         { v: 300,     label: "Show Agentic at (skills)",     cat: "Upgrade Reveal" },
  revealAgi:             { v: 3000,    label: "Show AGI at (skills)",         cat: "Upgrade Reveal" },
  revealSingularity:     { v: 50000,   label: "Show Singularity at (skills)", cat: "Upgrade Reveal" },

  promptClick:           { v: 2,       label: "Click power after Prompt",     cat: "Upgrade Effects" },
  chainClick:            { v: 5,       label: "Click power after Chain",      cat: "Upgrade Effects" },
  agenticBoost:          { v: 3,       label: "Agentic generator multiplier", cat: "Upgrade Effects" },
  agiBoost:              { v: 5,       label: "AGI generator multiplier",     cat: "Upgrade Effects" },
  agiClick:              { v: 25,      label: "Click power after AGI",        cat: "Upgrade Effects" },

  phase2HumanPct:        { v: 10,      label: "Phase 2 at human % below",    cat: "Phase Transitions" },
  phase3Skills:          { v: 50000,   label: "Phase 3 at total skills",     cat: "Phase Transitions" },

  demandCollapseAt:      { v: 10000,   label: "Demand collapse at (skills)", cat: "Economy Events" },
  demandCollapseValue:   { v: 0.30,    label: "Demand after collapse",       cat: "Economy Events", step: 0.05 },
  demandCollapseTokenCap:{ v: 5000,    label: "Token cap after collapse",    cat: "Economy Events" },
  lateGameTokenCap:      { v: 20000,   label: "Late game token cap",         cat: "Economy Events" },
  lateGameTokenCapAt:    { v: 50000,   label: "Late token cap at (skills)",  cat: "Economy Events" },
};

// Load saved config
let saved = {};
try {
  const s = localStorage.getItem("csf-config");
  if (s) saved = JSON.parse(s);
} catch(e) {}

// Build form
const container = document.getElementById("fields");
let currentCat = "";

for (const [key, def] of Object.entries(DEFAULTS)) {
  if (def.cat !== currentCat) {
    currentCat = def.cat;
    const h = document.createElement("h2");
    h.textContent = currentCat;
    container.appendChild(h);
  }

  const row = document.createElement("div");
  row.className = "row";

  const label = document.createElement("label");
  label.textContent = def.label;
  label.setAttribute("for", key);

  const input = document.createElement("input");
  input.type = "number";
  input.id = key;
  input.name = key;
  input.step = def.step || 1;
  input.value = saved[key] !== undefined ? saved[key] : def.v;

  row.appendChild(label);
  row.appendChild(input);
  container.appendChild(row);
}

function save() {
  const cfg = {};
  for (const key of Object.keys(DEFAULTS)) {
    const input = document.getElementById(key);
    cfg[key] = parseFloat(input.value);
  }
  cfg._v = 2;
  localStorage.setItem("csf-config", JSON.stringify(cfg));
  document.getElementById("status").textContent = "Saved. Redirecting...";
  setTimeout(() => { window.location.href = "./"; }, 800);
}

function reset() {
  localStorage.removeItem("csf-config");
  for (const [key, def] of Object.entries(DEFAULTS)) {
    document.getElementById(key).value = def.v;
  }
  document.getElementById("status").textContent = "Reset to defaults.";
}
</script>
</body>
</html>
