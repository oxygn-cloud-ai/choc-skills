# --- Triage / workflow ---
- name: needs-triage
  color: "e4e669"
  description: "Needs review and categorization"

- name: question
  color: "d876e3"
  description: "Further information requested"

- name: duplicate
  color: "cfd3d7"
  description: "Already exists"

- name: wontfix
  color: "ffffff"
  description: "Will not be worked on"

- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"
