name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # Validation and install already passed in CI — no need to re-run here

      - name: Generate checksums
        run: ./scripts/generate-checksums.sh

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for the current version from CHANGELOG.md
          # Uses awk instead of sed to avoid regex metacharacter issues in version strings
          version="${{ steps.version.outputs.version }}"
          awk -v ver="$version" '
            /^## \[/ { if (found) exit; if (index($0, "[" ver "]")) found=1 }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          body_path: /tmp/release-notes.md
          files: CHECKSUMS.sha256
          generate_release_notes: false
