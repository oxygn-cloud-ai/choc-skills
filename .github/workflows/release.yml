name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate skills
        run: |
          chmod +x scripts/*.sh
          ./scripts/validate-skills.sh

      - name: Install all skills
        run: ./install.sh --force

      - name: Health check
        run: ./install.sh --check

      - name: Generate checksums
        run: |
          chmod +x scripts/generate-checksums.sh
          ./scripts/generate-checksums.sh

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for the current version from CHANGELOG.md
          # Uses awk instead of sed to avoid regex metacharacter issues in version strings
          version="${{ steps.version.outputs.version }}"
          awk -v ver="$version" '
            /^## \[/ { if (found) exit; if (index($0, "[" ver "]")) found=1 }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          body_path: /tmp/release-notes.md
          files: CHECKSUMS.sha256
          generate_release_notes: false
