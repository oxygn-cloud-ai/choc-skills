name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Request type
      options:
        - New skill
        - Enhancement to existing skill
        - Installer improvement
        - Scripts improvement
        - CI improvement
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what need does it address?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
    validations:
      required: false

  - type: textarea
    id: skill-requirements
    attributes:
      label: Skill requirements (if proposing a new skill)
      description: If this is a new skill proposal, describe the requirements.
      placeholder: |
        - What tools does it need? (Read, Grep, Bash, etc.)
        - What subcommands should it have?
        - Does it need network access?
        - Does it need to write files?
    validations:
      required: false
